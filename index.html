<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O Melro - Registo de Visitantes</title>
    <!-- Tailwind via CDN is kept for simplicity in this setup, though normally we'd install it via npm -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              melro: {
                green: '#0d3c22',  
                dark: '#1F2937',   
                gray: '#F3F4F6',
                text: '#374151'
              }
            },
            fontFamily: {
              serif: ['Merriweather', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'slide-up': 'slideUp 0.8s ease-out forwards',
              'scale-in': 'scaleIn 0.8s ease-out forwards',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'rubber-band': 'rubberBand 1s both 0.5s',
              'float': 'float 3s ease-in-out infinite',
              'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              scaleIn: {
                '0%': { transform: 'scale(0.9)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              shimmer: {
                '0%': { opacity: '0.5' },
                '50%': { opacity: '1' },
                '100%': { opacity: '0.5' },
              },
              rubberBand: {
                '0%': { transform: 'scale3d(1, 1, 1)' },
                '30%': { transform: 'scale3d(1.15, 0.85, 1)' },
                '40%': { transform: 'scale3d(0.85, 1.15, 1)' },
                '50%': { transform: 'scale3d(1.05, 0.95, 1)' },
                '65%': { transform: 'scale3d(0.98, 1.02, 1)' },
                '75%': { transform: 'scale3d(1.02, 0.98, 1)' },
                '100%': { transform: 'scale3d(1, 1, 1)' },
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #FAFAFA;
      }
      .custom-scrollbar::-webkit-scrollbar {
          width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
          background: #f1f1f1; 
          border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background: #D1D5DB; 
          border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: #9CA3AF; 
      }
      
      /* PRINT STYLES - ROBUST CONFIGURATION */
      @media print {
        @page {
          size: auto;   /* auto is the initial value */
          margin: 0mm;  /* this affects the margin in the printer settings */
        }
        
        body {
          background-color: white !important;
          margin: 0 !important;
          padding: 0 !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Oculta tudo que tiver a classe no-print */
        .no-print, .no-print * {
          display: none !important;
          height: 0 !important;
          width: 0 !important;
          opacity: 0 !important;
        }

        /* Mostra apenas a área de impressão */
        .print-only {
          display: flex !important;
          visibility: visible !important;
          opacity: 1 !important;
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          width: 100vw !important;
          height: 100vh !important;
          align-items: center !important;
          justify-content: center !important;
          background: white !important;
          z-index: 9999 !important;
        }
        
        /* Remove headers e footers automáticos do browser */
        header, footer {
            display: none !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "react-qr-code": "https://esm.sh/react-qr-code@^2.0.18"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
    <!-- Vite Entry Point -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
